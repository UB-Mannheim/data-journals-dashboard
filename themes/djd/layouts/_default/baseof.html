<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }}{{ if not .IsHome }} | {{ .Title }}{{ end }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <div class="container">
    {{ partial "sidebar.html" . }}
    <main class="main-content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>
  <script>
    const FILTER_LABELS = {
      'type-filter':            'Data Journal Type',
      'publisher-filter':       'Publisher',
      'reasearch-field-filter': 'Research Field',
      'license-filter':         'License',
      'status-filter':          'Journal Status',
    };
    const FILTER_IDS = ['search-input', 'type-filter', 'status-filter', 'reasearch-field-filter', 'publisher-filter', 'license-filter'];
    const HOME_URL = '{{ "" | relURL }}';
    const HOME_PATH = new URL(HOME_URL, window.location.origin).pathname;

    function isHomepage() {
      const path = window.location.pathname.replace(/index\.html$/, '');
      const home = HOME_PATH.replace(/index\.html$/, '');
      return path === home || path === home.replace(/\/$/, '') || path + '/' === home;
    }

    // Collect all currently-set filter values into URLSearchParams
    function collectFilterParams() {
      const params = new URLSearchParams();
      FILTER_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el?.value) params.set(id, el.value);
      });
      return params;
    }

    // Build a homepage URL carrying all currently-set filter values
    function buildHomeUrl() {
      const qs = collectFilterParams().toString();
      return qs ? `${HOME_URL}?${qs}` : HOME_URL;
    }

    // Apply filter values from the current URL query params to the controls.
    function applyFiltersFromUrl() {
      const params = new URLSearchParams(window.location.search);
      let any = false;
      FILTER_IDS.forEach(id => {
        if (params.has(id)) {
          const el = document.getElementById(id);
          if (el) { el.value = params.get(id); any = true; }
        }
      });
      return any;
    }

    // Homepage: Reflect the current filter values into the URL
    function syncUrlToFilters() {
      const qs = collectFilterParams().toString();
      history.replaceState(null, '', qs ? `${window.location.pathname}?${qs}` : window.location.pathname);
    }

    function parseAttr(val) {
      try { return JSON.parse(val).map(v => String(v).toLowerCase()); } catch { return val ? [val.toLowerCase()] : []; }
    }

    function renderFilterTags() {
      const container = document.getElementById('active-filters');
      if (!container) return;
      const tags = [];
      for (const [id, label] of Object.entries(FILTER_LABELS)) {
        const el = document.getElementById(id);
        if (el?.value) {
          tags.push(`<span class="filter-tag" onclick="removeFilter('${id}')" role="button" aria-label="Remove ${label} filter">${label}: ${el.value}</span>`);
        }
      }
      container.innerHTML = tags.join('');
      container.style.display = tags.length ? 'flex' : 'none';
    }

    function removeFilter(id) {
      const el = document.getElementById(id);
      if (el) { el.value = ''; filterJournals(); }
    }

    function filterJournals() {
      const val = id => (document.getElementById(id)?.value || '').toLowerCase();
      const searchTerm = val('search-input');
      const selectedDataJournalType = val('type-filter');
      const selectedPublisher = val('publisher-filter');
      const selectedResearchField = val('reasearch-field-filter');
      const selectedLicenseType = val('license-filter');
      const selectedStatus = val('status-filter');

      const cards = document.querySelectorAll('.journal-card');
      let visible = 0;
      cards.forEach(card => {
        const title = card.dataset.title ? card.dataset.title.toLowerCase() : '';
        const keywords = card.dataset.keywords ? card.dataset.keywords.toLowerCase() : '';
        const issn = card.dataset.issn ? card.dataset.issn.toLowerCase() : '';
        const pissn = card.dataset.pissn ? card.dataset.pissn.toLowerCase() : '';
        const publisherArr = parseAttr(card.dataset.publisher);
        const dataJournalTypeArr = parseAttr(card.dataset.dataJournalType);
        const researchFieldsArr = parseAttr(card.dataset.researchFields);
        const licenseTypesArr = parseAttr(card.dataset.licenseTypes);

        const matchesSearch = !searchTerm ||
          title.includes(searchTerm) ||
          issn.includes(searchTerm) ||
          pissn.includes(searchTerm) ||
          keywords.includes(searchTerm) ||
          publisherArr.some(v => v.includes(searchTerm)) ||
          dataJournalTypeArr.some(v => v.includes(searchTerm)) ||
          researchFieldsArr.some(v => v.includes(searchTerm)) ||
          licenseTypesArr.some(v => v.includes(searchTerm));

        const matchesDataJournalType = !selectedDataJournalType || dataJournalTypeArr.includes(selectedDataJournalType);
        const matchesPublisher = !selectedPublisher || publisherArr.includes(selectedPublisher);
        const matchesResearchField = !selectedResearchField || researchFieldsArr.some(v => v.includes(selectedResearchField));
        const matchesLicenseType = !selectedLicenseType || licenseTypesArr.includes(selectedLicenseType);
        const matchesStatus = !selectedStatus || card.dataset.isActive === selectedStatus;

        const show = matchesSearch && matchesDataJournalType && matchesPublisher && matchesResearchField && matchesLicenseType && matchesStatus;
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });

      // Update journal count
      const total = cards.length;
      const countEl = document.getElementById('journal-count');
      if (countEl) {
        countEl.textContent = visible < total ? `${visible}` : total;
      }

      renderFilterTags();
      updateRowShadows();
      if (isHomepage()) syncUrlToFilters();
    }

    function updateRowShadows() {
      const cards = [...document.querySelectorAll('.journal-card')]
        .filter(c => c.style.display !== 'none');
      if (!cards.length) return;
      const firstTop = cards[0].offsetTop;
      cards.forEach(card => {
        card.classList.toggle('row-shadow', card.offsetTop > firstTop);
      });
    }

    function resetFilters() {
      FILTER_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      filterJournals();
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (isHomepage()) {
        // Homepage: filter journal grid in place.
        document.querySelectorAll('.filter-input').forEach(input => {
          input.addEventListener('input', filterJournals);
          input.addEventListener('change', filterJournals);
        });
        // Apply any filters passed via URL; otherwise reset to a clean state.
        if (applyFiltersFromUrl()) {
          filterJournals();
        } else {
          resetFilters();
        }
      } else {
        // On other pages go back to Homepage
        const goHome = () => { window.location.href = buildHomeUrl(); };
        document.querySelectorAll('select.filter-input').forEach(select => {
          select.addEventListener('change', goHome);
        });
        const search = document.getElementById('search-input');
        if (search) {
          search.addEventListener('change', goHome);
          search.addEventListener('keydown', e => { if (e.key === 'Enter') goHome(); });
        }
      }
      updateRowShadows();
      window.addEventListener('resize', updateRowShadows);
    });
  </script>
</body>
</html>
