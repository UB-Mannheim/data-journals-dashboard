<aside class="sidebar" id="sidebar">
  <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  {{- $d := hugo.Data.field_descriptions -}}
  <h2 align="left"><a href="{{ .Site.BaseURL }}">Data Journals Dashboard</a></h2>

  <div class="filter-group">
    <input type="text" id="search-input" class="filter-input" placeholder="Search the collection ...">
  </div>

  <div class="filter-group">
    <label for="type-filter">Data Journal Type {{ with index $d "data_journal_type" }}<span class="tooltip" data-tip="{{ . }}">?</span> {{ end }}</label>
    <select id="type-filter" class="filter-input">
      <option value="">All Types</option>
      {{ range $name, $pages := .Site.Taxonomies.data_journal_type }}
      <option value="{{ $name }}">{{ $name }}</option>
      {{ end }}
    </select>
  </div>

  <div class="filter-group">
    <label for="status-filter">Journal Status {{ with index $d "is_active" }}<span class="tooltip" data-tip="{{ . }}">?</span> {{ end }}</label>
    <select id="status-filter" class="filter-input">
      <option value="">All Status Types</option>
      <option value="active">active</option>
      <option value="inactive">inactive</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="reasearch-field-filter">Research Field</label>
    <select id="reasearch-field-filter" class="filter-input">
      <option value="">All Research Fields</option>
      {{ with $.Site.GetPage "/research_fields" }}
      {{ range .Pages }}
      <option value="{{ .Title }}">{{ .Title }}</option>
      {{ end }}
      {{ end }}
    </select>
  </div>

  <div class="filter-group">
    <label for="publisher-filter">Publisher</label>
    <select id="publisher-filter" class="filter-input">
      <option value="">All Publishers</option>
      {{ with $.Site.GetPage "/publisher" }}
      {{ range .Pages }}
      <option value="{{ .Title }}">{{ .Title }}</option>
      {{ end }}
      {{ end }}
    </select>
  </div>

  <div class="filter-group">
    <label for="license-filter">License Type</label>
    <select id="license-filter" class="filter-input">
      <option value="">All License Types</option>
      {{ with $.Site.GetPage "/license_types" }}
      {{ range .Pages }}
      <option value="{{ .Title }}">{{ .Title }}</option>
      {{ end }}
      {{ end }}
    </select>
  </div>

</aside>
