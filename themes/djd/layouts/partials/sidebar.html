<aside class="sidebar">
  <h2><a href="{{ .Site.BaseURL }}">Data Journals Dashboard 🪴</a></h2>
  
  <div class="filter-group">
    <label for="search-input">Search</label>
    <input type="text" id="search-input" class="filter-input" placeholder="Search all fields...">
  </div>

  <div class="filter-group">
    <label for="type-filter">Data Journal Type</label>
    {{ $currentType := "" }}
    {{ if strings.HasPrefix .RelPermalink "/data_journal_type/" }}
      {{ $currentType = path.Base .RelPermalink }}
    {{ end }}
    <select id="type-filter" class="filter-input" onchange="navigateToDataJournalType(this.value)">
      <option value=""{{ if not $currentType }} selected{{ end }}>All Types</option>
      {{ range $name, $pages := .Site.Taxonomies.data_journal_type }}
      <option value="{{ $name | urlize }}"{{ if eq $currentType ($name | urlize) }} selected{{ end }}>{{ $name }}</option>
      {{ end }}
    </select>
  </div>

  <div class="filter-group">
    <label for="publisher-filter">Publisher</label>
    {{ $currentPublisher := .RelPermalink }}
    <select id="publisher-filter" class="filter-input" onchange="navigateToPublisher(this.value)">
      <option value=""{{ if not (strings.HasPrefix $currentPublisher "/publisher/") }} selected{{ end }}>All Publishers</option>
      {{ with $.Site.GetPage "/publisher" }}
      {{ range .Pages }}
      <option value="{{ .RelPermalink }}"{{ if eq $currentPublisher .RelPermalink }} selected{{ end }}>{{ .Title }}</option>
      {{ end }}
      {{ end }}
    </select>
  </div>

  <div class="filter-group">
    <label for="keyword-filter">Keyword</label>
    <input type="text" id="keyword-filter" class="filter-input" placeholder="Filter by keyword...">
  </div>

  <div class="filter-group">
    <label for="field-filter">Research Field</label>
    <input type="text" id="field-filter" class="filter-input" placeholder="Filter by field...">
  </div>

  <div class="links-group">
    
  </div>
</aside>
