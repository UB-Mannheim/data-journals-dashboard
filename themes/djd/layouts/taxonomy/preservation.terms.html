{{ define "main" }}
  <header class="site-header">
    <h1>{{ .Title }}</h1>
  </header>

  <div class="tags-list">
    {{ range $name, $pages := .Site.Taxonomies.preservation }}
    <a href="/preservation/{{ $name | urlize }}" class="tag">{{ $name }} ({{ len $pages }})</a>
    {{ end }}
  </div>
{{ end }}
