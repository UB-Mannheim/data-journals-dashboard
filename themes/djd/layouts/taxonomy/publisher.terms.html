{{ define "main" }}
  <header class="site-header">
    <h1>{{ .Title }}</h1>
  </header>

  <div class="tags-list">
    {{ range $name, $pages := .Site.Taxonomies.publisher }}
    <a href="{{ printf "publisher/%s" ($name | urlize) | relURL }}" class="tag">{{ $name }} ({{ len $pages }})</a>
    {{ end }}
  </div>
{{ end }}
