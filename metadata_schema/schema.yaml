# DATA JOURNALS DASHBOARD – METADATA SCHEMA
# =========================================
# Author: Thomas Schmidt (thomas.schmidt@uni-mannheim.de)
# ORCID: https://orcid.org/0000-0003-3620-3355
# =========================================
#
# The metadata schema combines metadata fields of different origin to form the collection
# and validation basis metadata used in the Data Journals Dashboard. The origin of each 
# field can be traced by the "source" mapping name of each field.
#
# BASE METADATA
# =============
# Base metadata fields originate from a publication by Kindling, M. & Strecker, D. (2022).
# These fields can be traced by "source == 'csv'". Metadata of this type is licensed
# under CC0 1.0: https://creativecommons.org/publicdomain/zero/1.0/deed.de
#
# - Publication: Kindling, M., & Strecker, D. (2022). List of data journals (1.0) [Data set]. 
#   Zenodo. https://doi.org/10.5281/zenodo.7082126
# - GitHub repository: https://github.com/MaxiKi/data-journals
# 
# CORE METADATA
# =============
# Core metadata fields are a combination of base metadata fields and custom added fields
# of type "source == 'djd'" (Data Journals Dashboard).
#
# FULL METADATA
# =============
# Full metadata fields are a combination of base, core and additional metadata originating
# from the Directory of Open Access Journals (https://doaj.org) public API. DOAJ metadata
# fields can be traced by "source == 'doaj'". DOAJ's API metadata is licensed under
# CC0 1.0 Universal: https://doaj.org/terms/#metadata
#
# LICENSE
# =======
# This metadata schema is made available for reuse under CC0 1.0 Universal:
# https://creativecommons.org/publicdomain/zero/1.0/deed.de
#
# CODEBOOK FOR METADATA FIELDS
# ============================
# label: field label
# description: field description
# source: source or origin of this field: "csv" = Kindling, M. & Strecker, D. (2022), "doaj" = Directory of Open Access Journals, "djd" = Data Journals Dashboard
# source_path: csv column name or Directory of Open Access Journals json (nested) key
# type: data type of the field
# required: boolean; indiciates if this field is requried for adding a new journal to the collection
# default: the fields default value
# schema_level: indiciates if field is part of the "base", "core" or "full" schema level (see above)


fields:

  - name: id
    label: "ID"
    description: "Sequential integer id for each data journal assigned during processing."
    source: djd
    source_path: id
    type: integer
    required: true
    default: null
    schema_level: core

  - name: issn
    label: "ISSN"
    description: "Primary ISSN of the data journal."
    source: csv
    source_path: ISSN
    type: string
    required: true
    default: null
    schema_level: base

  - name: journal_title
    label: "Journal Title"
    description: "Official journal title."
    source: csv
    source_path: journal_title
    type: string
    required: true
    default: null
    schema_level: base

  - name: publisher
    label: "Publisher"
    description: "Name of the publisher of the data journal."
    source: csv
    source_path: publisher
    type: string
    required: true
    default: null
    schema_level: base

  - name: url
    label: "URL"
    description: "URL link to the journal's website."
    source: csv
    source_path: URL
    type: string
    required: true
    default: null
    schema_level: base

  - name: data_journal_type
    label: "Data Journal Type"
    description: "Type of the data journal: Either pure (journal has a strong focus on publishing data papers) or mixed (journal also publishes other publication types)"
    source: csv
    source_path: data_journal_type
    type: string
    required: true
    default: null
    schema_level: base

  - name: is_active
    label: "Journal Status"
    description: "Indicates whether the data journal is currently active and publishing new papers or has ceased/paused publication."
    source: djd
    source_path: is_active
    type: boolean
    required: true
    default: true
    schema_level: core
  
  - name: enrichment_source
    label: "Source of Metadata Enrichment"
    description: "Provider or source of additional metadata used to enrich metadata fields beyond the base attributes ISSN, Journal Title, Publisher, URL and Data Journal Type"
    source: djd
    source_path: enrichment_source
    type: string
    required: true
    default: null
    schema_level: full

  ## ISSNs

  - name: eissn
    label: "eISSN"
    description: "Electronic ISSN."
    source: doaj
