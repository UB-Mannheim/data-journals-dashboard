# DATA JOURNALS DASHBOARD – METADATA SCHEMA
# =========================================
# Author: Thomas Schmidt (thomas.schmidt@uni-mannheim.de)
# ORCID: https://orcid.org/0000-0003-3620-3355
# =========================================
#
# The metadata schema combines metadata fields of different origin to form the collection
# and validation basis for data journal metadata used in the Data Journals Dashboard.
# The field's origin can be traced by the "schema_level" and "source" attributes of each 
# metadata field.
#
# BASE METADATA
# =============
# Base metadata fields are a subset of the core metadata fields (schema_level == 'core') and
# originate from a publication by Kindling, M. & Strecker, D. (2022). Metadata fields of this
# origin can be traced by "schema_level == 'core' AND source == 'csv'". The metadata is
# licensed under CC0 1.0: https://creativecommons.org/publicdomain/zero/1.0/deed.de
#
# - Publication: Kindling, M., & Strecker, D. (2022). List of data journals (1.0) [Data set]. 
#   Zenodo. https://doi.org/10.5281/zenodo.7082126
# - GitHub repository: https://github.com/MaxiKi/data-journals
# 
# CORE METADATA
# =============
# Core metadata fields are a combination of base metadata fields and custom added fields of
# source type "djd" (data journal dashboard). 
#
# FULL METADATA
# =============
# All other metadata fields ("schema_level == 'full'") are originating from the Directory of
# Open Access Journals (https://doaj.org) public API and can be traced by the source type "doaj".
# DOAJ's API metadata is licensed under CC0 1.0 Universal: https://doaj.org/terms/#metadata
#
# LICENSE
# =======
# This metadata schema is made available for reuse under CC0 1.0 Universal:
# https://creativecommons.org/publicdomain/zero/1.0/deed.de


fields:

  - key: id
    label: "ID"
    description: "Sequential integer id for each data journal assigned during processing."
    source: djd
    type: integer
    required: true
    default: null
    schema_level: internal

  - key: issn
    label: "ISSN"
    description: "Primary ISSN of the data journal."
    source: csv
    csv_column: ISSN
    type: string
    required: true
    default: null
    schema_level: core

  - key: journal_title
    label: "Journal Title"
    description: "Official journal title."
    source: csv
    csv_column: journal_title
    type: string
    required: true
    default: null
    schema_level: core

  - key: publisher
    label: "Publisher"
    description: "Name of the publisher of the data journal."
    source: csv
    csv_column: publisher
    type: string
    required: true
    default: null
    schema_level: core

  - key: url
    label: "URL"
    description: "URL link to the journal's website."
    source: csv
    csv_column: URL
    type: string
    required: true
    default: null
    schema_level: core

  - key: data_journal_type
    label: "Data Journal Type"
    description: "Type of the data journal: Either pure (journal has a strong focus on publishing data papers) or mixed (journal also publishes other publication types)"
    source: csv
    csv_column: data_journal_type
    type: string
    required: true
    default: null
    schema_level: core

  - key: is_active
    label: "Journal Status"
    description: "Indicates whether the data journal is currently active and publishing new papers or has ceased/paused publication."
    source: djd
    csv_column: is_active
    type: boolean
    required: true
    default: null
    schema_level: core
  
  - key: enrichment_source
    label: "Source of Metadata Enrichment"
    description: "Provider or source of additional metadata used to enriched the core metadata fields ISSN, Journal Title, Publisher, URL and Data Journal Type"
    source: djd
    type: string
    required: true
    default: null
    schema_level: core

  ## ISSNs

  - key: eissn
    label: "eISSN"
    description: "Electronic ISSN from DOAJ."
    source: doaj
    doaj_path: "eissn"
    type: string
    required: false
    default: null
    schema_level: full

  - key: pissn
    label: "pISSN"
    description: "Print ISSN from DOAJ."
    source: doaj
    doaj_path: "pissn"
    type: string
    required: false
    default: null
    schema_level: full

  - key: language
    label: "Languages"
    description: "List of publication languages (ISO 639-1 codes)."
    source: doaj
    doaj_path: "language"
    type: list
    required: false
    default: []
    schema_level: full

  - key: oa_start
    label: "OA Start Year"
    description: "Year the journal became open access."
    source: doaj
    doaj_path: "oa_start"
    type: integer
    required: false
    default: null
    schema_level: full

  - key: boai
    label: "BOAI Compliant"
    description: "Whether the journal complies with the Budapest Open Access Initiative definition."
    source: doaj
    doaj_path: "boai"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: publication_time_weeks
    label: "Publication Time (weeks)"
    description: "Average time from submission to publication in weeks."
    source: doaj
    doaj_path: "publication_time_weeks"
    type: integer
    required: false
    default: null
    schema_level: full

  - key: keywords
    label: "Keywords"
    description: "Author-supplied or editor-assigned keywords for the journal."
    source: doaj
    doaj_path: "keywords"
    type: list
    required: false
    default: []
    schema_level: full

  ## Subjects / research fields

  - key: research_fields
    label: "Research Fields"
    description: "List of subject terms describing the journal's scope."
    source: doaj
    doaj_path: "subject[].term"
    type: list
    required: false
    default: []
    schema_level: full

  - key: subject_codes
    label: "Subject Codes"
    description: "Full subject objects including term, classification code, and scheme (e.g. LCC)."
    source: doaj
    doaj_path: "subject[]"
    type: list
    required: false
    default: []
    schema_level: full

  ## Publisher & institution

  - key: publisher_name
    label: "Publisher Name (DOAJ)"
    description: "Publisher name as recorded in DOAJ."
    source: doaj
    doaj_path: "publisher.name"
    type: string
    required: false
    default: null
    schema_level: full

  - key: publisher_country
    label: "Publisher Country"
    description: "Country of the publisher (ISO 3166-1 alpha-2)."
    source: doaj
    doaj_path: "publisher.country"
    type: string
    required: false
    default: null
    schema_level: full

  - key: institution_name
    label: "Institution Name"
    description: "Sponsoring institution name, if applicable."
    source: doaj
    doaj_path: "institution.name"
    type: string
    required: false
    default: null
    schema_level: full

  - key: institution_country
    label: "Institution Country"
    description: "Country of the sponsoring institution (ISO 3166-1 alpha-2)."
    source: doaj
    doaj_path: "institution.country"
    type: string
    required: false
    default: null
    schema_level: full

  ## Editorial process

  - key: review_process
    label: "Review Process"
    description: "Peer review types used by the journal (e.g. double blind, open peer review)."
    source: doaj
    doaj_path: "editorial.review_process"
    type: list
    required: false
    default: []
    schema_level: full

  - key: review_url
    label: "Review Process URL"
    description: "URL describing the journal's peer review process."
    source: doaj
    doaj_path: "editorial.review_url"
    type: url
    required: false
    default: null
    schema_level: full

  - key: board_url
    label: "Editorial Board URL"
    description: "URL listing the editorial board members."
    source: doaj
    doaj_path: "editorial.board_url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Licensing

  - key: license_types
    label: "License Types"
    description: "List of Creative Commons or other license type identifiers (e.g. CC BY, CC BY-NC)."
    source: doaj
    doaj_path: "license[].type"
    type: list
    required: false
    default: []
    schema_level: full

  ## Article Processing Charges (APC)

  - key: apc_has
    label: "Has APC"
    description: "Whether the journal charges article processing charges."
    source: doaj
    doaj_path: "apc.has_apc"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: apc_max
    label: "APC Maximum"
    description: "Maximum APC fee(s) as a list of {price, currency} objects."
    source: doaj
    doaj_path: "apc.max"
    type: list
    required: false
    default: []
    schema_level: full

  - key: apc_url
    label: "APC URL"
    description: "URL with details about the journal's APC policy."
    source: doaj
    doaj_path: "apc.url"
    type: url
    required: false
    default: null
    schema_level: full

  - key: other_charges
    label: "Has Other Charges"
    description: "Whether the journal charges fees beyond APCs (e.g. submission fees)."
    source: doaj
    doaj_path: "other_charges.has_other_charges"
    type: boolean
    required: false
    default: null
    schema_level: full

  ## Waiver policy

  - key: waiver_has
    label: "Has Waiver"
    description: "Whether the journal offers APC waivers."
    source: doaj
    doaj_path: "waiver.has_waiver"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: waiver_url
    label: "Waiver URL"
    description: "URL with details about the journal's waiver policy."
    source: doaj
    doaj_path: "waiver.url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Preservation

  - key: preservation_has
    label: "Has Preservation"
    description: "Whether the journal participates in a digital preservation scheme."
    source: doaj
    doaj_path: "preservation.has_preservation"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: preservation_services
    label: "Preservation Services"
    description: "List of preservation services used (e.g. CLOCKSS, Portico)."
    source: doaj
    doaj_path: "preservation.service"
    type: list
    required: false
    default: []
    schema_level: full

  - key: preservation_url
    label: "Preservation URL"
    description: "URL with details about the journal's preservation policy."
    source: doaj
    doaj_path: "preservation.url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Persistent Identifiers (PIDs)

  - key: pid_schemes
    label: "PID Schemes"
    description: "Persistent identifier schemes supported for articles (e.g. DOI, Handle)."
    source: doaj
    doaj_path: "pid_scheme.scheme"
    type: list
    required: false
    default: []
    schema_level: full

  ## Plagiarism detection

  - key: plagiarism_detection
    label: "Plagiarism Detection"
    description: "Whether the journal uses plagiarism detection software."
    source: doaj
    doaj_path: "plagiarism.detection"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: plagiarism_url
    label: "Plagiarism Detection URL"
    description: "URL describing the journal's plagiarism detection policy."
    source: doaj
    doaj_path: "plagiarism.url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Copyright

  - key: copyright_author_retains
    label: "Author Retains Copyright"
    description: "Whether authors retain copyright of published articles."
    source: doaj
    doaj_path: "copyright.author_retains"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: copyright_url
    label: "Copyright URL"
    description: "URL describing the journal's copyright policy."
    source: doaj
    doaj_path: "copyright.url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Deposit policy

  - key: deposit_policy_has
