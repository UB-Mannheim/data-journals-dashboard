    description: "Whether the journal has a defined self-archiving / deposit policy."
    source: doaj
    doaj_path: "deposit_policy.has_policy"
    type: boolean
    required: false
    default: null
    schema_level: full

  - key: deposit_policy_services
    label: "Deposit Policy Services"
    description: "Repositories or registries where the deposit policy is recorded (e.g. Sherpa/RoMEO)."
    source: doaj
    doaj_path: "deposit_policy.service"
    type: list
    required: false
    default: []
    schema_level: full

  - key: deposit_policy_url
    label: "Deposit Policy URL"
    description: "URL with details about the journal's deposit/self-archiving policy."
    source: doaj
    doaj_path: "deposit_policy.url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Article-level metadata

  - key: article_license_display
    label: "Article License Display"
    description: "How the license is displayed on article pages (e.g. on article, on website)."
    source: doaj
    doaj_path: "article.license_display"
    type: list
    required: false
    default: []
    schema_level: full

  - key: article_license_example_url
    label: "Article License Example URL"
    description: "URL of an example article showing license display."
    source: doaj
    doaj_path: "article.license_display_example_url"
    type: url
    required: false
    default: null
    schema_level: full

  ## Reference / external links

  - key: ref_journal
    label: "Journal Homepage"
    description: "URL of the journal's homepage."
    source: doaj
    doaj_path: "ref.journal"
    type: url
    required: false
    default: null
    schema_level: full

  - key: ref_aims_scope
    label: "Aims & Scope URL"
    description: "URL of the journal's aims and scope page."
    source: doaj
    doaj_path: "ref.aims_scope"
    type: url
    required: false
    default: null
    schema_level: full

  - key: ref_oa_statement
    label: "OA Statement URL"
    description: "URL of the journal's open access statement."
    source: doaj
    doaj_path: "ref.oa_statement"
    type: url
    required: false
    default: null
    schema_level: full

  - key: ref_author_instructions
    label: "Author Instructions URL"
    description: "URL of the journal's author guidelines / instructions for authors."
    source: doaj
    doaj_path: "ref.author_instructions"
    type: url
    required: false
    default: null
    schema_level: full

  - key: ref_license_terms
    label: "License Terms URL"
    description: "URL of the journal's full license terms page."
    source: doaj
    doaj_path: "ref.license_terms"
    type: url
    required: false
    default: null
    schema_level: full
