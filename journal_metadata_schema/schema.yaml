# Blueprint for a data journal metadata record.
#
# Each field entry:
#   key        – canonical field name used in the output JSON
#   label      – human-readable display name
#   description – what the field captures
#   source     – where the value comes from:
#                  generated  → computed at processing time (e.g. sequential id)
#                  csv        → pulled from the upstream CSV (csv_column names the column)
#                  doaj       → fetched from the DOAJ API (bibjson path in doaj_path)
#                  default    → static default value defined here
#   type       – expected data type (string | integer | boolean | list | dict | url | null)
#   required   – whether the field must be present for a valid record
#   default    – fallback value when the source yields nothing
#   csv_column – (csv only) column name in the upstream CSV
#   doaj_path  – (doaj only) dotted path into bibjson for documentation purposes

fields:

  # ── Core / generated ──────────────────────────────────────────────────────

  - key: id
    label: "ID"
    description: "Sequential integer identifier assigned during processing."
    source: generated
    type: integer
    required: true
    default: null

  # ── CSV-sourced fields ─────────────────────────────────────────────────────

  - key: issn
    label: "ISSN"
    description: "Primary ISSN used as the lookup key."
    source: csv
    csv_column: issn
    type: string
    required: true
    default: null

  - key: journal_title
    label: "Journal Title"
    description: "Official journal title as listed in the source CSV."
    source: csv
    csv_column: journal_title
    type: string
    required: true
    default: null

  - key: publisher
    label: "Publisher"
    description: "Publisher name as listed in the source CSV."
    source: csv
    csv_column: publisher
    type: string
    required: false
    default: null

  - key: data_journal_type
    label: "Data Journal Type"
    description: "Classification of the data journal (e.g. standalone, overlay, section)."
    source: csv
    csv_column: data_journal_type
    type: string
    required: false
    default: null

  # ── DOAJ-sourced fields ────────────────────────────────────────────────────
  # Populated by get_doaj_metadata() via the DOAJ API (https://doaj.org/api/).
  # All paths are relative to bibjson of the first result.

  ## Identifiers & basic metadata

  - key: eissn
    label: "eISSN"
    description: "Electronic ISSN from DOAJ."
    source: doaj
    doaj_path: "eissn"
    type: string
    required: false
    default: null

  - key: pissn
    label: "pISSN"
    description: "Print ISSN from DOAJ."
    source: doaj
    doaj_path: "pissn"
    type: string
    required: false
    default: null

  - key: title
    label: "Title (DOAJ)"
    description: "Journal title as stored in DOAJ."
    source: doaj
    doaj_path: "title"
    type: string
    required: false
    default: null

  - key: language
    label: "Languages"
    description: "List of publication languages (ISO 639-1 codes)."
    source: doaj
    doaj_path: "language"
    type: list
    required: false
    default: []

  - key: oa_start
    label: "OA Start Year"
    description: "Year the journal became open access."
    source: doaj
    doaj_path: "oa_start"
    type: integer
    required: false
    default: null

  - key: boai
    label: "BOAI Compliant"
    description: "Whether the journal complies with the Budapest Open Access Initiative definition."
    source: doaj
    doaj_path: "boai"
    type: boolean
    required: false
    default: null

  - key: publication_time_weeks
    label: "Publication Time (weeks)"
    description: "Average time from submission to publication in weeks."
    source: doaj
    doaj_path: "publication_time_weeks"
    type: integer
    required: false
    default: null

  - key: keywords
    label: "Keywords"
    description: "Author-supplied or editor-assigned keywords for the journal."
    source: doaj
    doaj_path: "keywords"
    type: list
    required: false
    default: []

  ## Subjects / research fields

  - key: research_field
    label: "Research Fields"
