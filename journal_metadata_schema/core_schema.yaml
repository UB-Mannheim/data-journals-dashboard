# CORE METADATA SCHEMA
# The core metadata fields originate from this publication and GitHub repository: 
# Publication: Kindling, M., & Strecker, D. (2022). List of data journals (1.0) [Data set]. Zenodo. https://doi.org/10.5281/zenodo.7082126
# GitHub repository: https://github.com/MaxiKi/data-journals

fields:

  - key: id
    label: "ID"
    description: "Sequential integer id for each data journal assigned during processing."
    source: generated
    type: integer
    required: true
    default: null

  - key: issn
    label: "ISSN"
    description: "Primary ISSN of the data journal."
    source: csv
    csv_column: ISSN
    type: string
    required: true
    default: null

  - key: journal_title
    label: "Journal Title"
    description: "Official journal title."
    source: csv
    csv_column: journal_title
    type: string
    required: true
    default: null

  - key: publisher
    label: "Publisher"
    description: "Name of the publisher of the data journal."
    source: csv
    csv_column: publisher
    type: string
    required: true
    default: null

  - key: url
    label: "URL"
    description: "URL link to the journal's website."
    source: csv
    csv_column: URL
    type: string
    required: true
    default: null

  - key: data_journal_type
    label: "Data Journal Type"
    description: "Classification of the data journal: pure or mixed. A description of the rationale for the classification is available at https://doi.org/10.5281/zenodo.7082126"
    source: csv
    csv_column: data_journal_type
    type: string
    required: true
    default: null