name: Deploy Hugo Site

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'data/processed/data_journals.yaml'
      - 'archetypes/**'
      - 'themes/**'
      - 'content/**'
      - 'config/**'
      - 'layouts/**'
      - 'public/**'
      - 'hugo-data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Generate Hugo content
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, 'src')
          from hugo_transform import create_journal_content_for_hugo
          create_journal_content_for_hugo(
              Path('data/processed/data_journals.yaml'),
              Path('content/journals')
          )
          "

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4