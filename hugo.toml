baseURL = "https://ub-mannheim.github.io/data-journals-dashboard/"
locale = "en-us"
title = "Data Journals Dashboard"
theme = "djd"
DataDir = "hugo-data"

[params]
  description = "Search and filter data journals by type, publisher, research field, and more"
  version = "v2026-05-28"
  [params.author]
    name = "Thomas Schmidt"
    orcid = "https://orcid.org/0000-0003-3620-3355"
    affiliation = "University Library Mannheim"
    email = "thomas.schmidt@uni-mannheim.de"

[taxonomies]
  data_journal_type = "data_journal_type"
  publisher = "publisher"
  keywords = "keywords"
  research_fields = "research_fields"
  license_types = "license_types"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    style = "github"
